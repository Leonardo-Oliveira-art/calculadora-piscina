<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Piscina</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="calculadora-card">

<h2>Calculadora de Piscina</h2>

<div class="campo">
<label>Comprimento (m)</label>
<input type="number" id="comprimento" step="0.01">
</div>

<div class="campo">
<label>Largura (m)</label>
<input type="number" id="largura" step="0.01">
</div>

<div class="campo">
<label>Profundidade mínima (m)</label>
<input type="number" id="profMin" step="0.01">
</div>

<div class="campo">
<label>Profundidade máxima (m)</label>
<input type="number" id="profMax" step="0.01">
</div>

<button onclick="calcularPiscina()" class="btn-calcular">
Calcular
</button>

<div id="resultado" class="resultado"></div>

</div>

<script src="script.js"></script>

</body>
</html>
